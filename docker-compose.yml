version: "3"
services:
  djj:
    image: lzylipu/djj:latest
    container_name: djj
    ports:
      - "8080:8080"
    volumes:
      - djj-data:/data
      # 视频目录挂载(只读)
      # - /path/to/videos:/videos/name:ro
    environment:
      - PORT=8080
      # 密钥环境变量见.env.example
    restart: unless-stopped

volumes:
  djj-data:
