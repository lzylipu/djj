version: "3.8"

services:
  djj:
    image: lzylipu/djj:latest
    container_name: djj
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - TZ=Asia/Shanghai
      - API_SECRET=your-secret-key-change-me
      - PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - djj-data:/data
      - /srv/videos:/videos:ro

volumes:
  djj-data:
