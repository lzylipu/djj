name: djj

services:
  djj:
    build: .
    image: djj:latest
    container_name: djj
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ${VIDEO_DIR:-./videos}:/videos:ro
    environment:
      - VIDEO_DIRS=${VIDEO_DIRS:-["/videos"]}
      - SOURCE_NAMES=${SOURCE_NAMES:-["默认"]}
      - API_SECRET=${API_SECRET}
    env_file:
      - .env
