version: "3"
services:
  djj:
    image: lzylipu/djj:latest
    container_name: djj
    ports:
      - "8080:8080"
    volumes:
      - djj-data:/data
      # - /your/videos/dance:/videos/dance:ro
    environment:
      - PORT=8080
      # - API_SECRET=your-secret
    restart: unless-stopped

volumes:
  djj-data:
