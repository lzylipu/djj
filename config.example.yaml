  # 随机视频(直接mp4流)
  随机视频3: https://v.api.aa1.cn/api/video/ns/

  # 随机视频(JSON): 返回 {"msg":"...","data":{"link":"..."}}
  随机视频4: https://www.btstu.cn/api/randvideo

  # 韩舞(直接mp4流)
  韩舞: https://api.1314.fit/api/hanwu

