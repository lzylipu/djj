# DJJ 配置文件
# ============
# 容器首次启动会在 /data/config.yaml 自动生成此文件
# 修改后重启容器生效: docker restart djj

server:
  port: 8080
  secret: change-me-to-random

sources:
  - name: 舞蹈
    type: local
    path: /videos/舞蹈
  - name: 搞笑
    type: local
    path: /videos/搞笑
  - name: 风景
    type: local
    path: /videos/风景
  # - name: 在线热舞
