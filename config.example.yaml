  # 随机视频(JSON): 返回 {"code":200,"url":"..."}
  随机视频2: https://api.1314.fit/api/video/url

  # 美女热舞(JSON): 返回 {"code":0,"data":"..."}
  美女热舞: https://api.likest.cn/api/video

  # 随机小姐姐(JSON): 返回 {"code":200,"url":"..."}
