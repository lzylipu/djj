server:
  port: 8080
  secret: change-me-to-random-string

# 视频源: 源名: 路径或URL
# / 开头 = 本地目录(自动识别)
# http 开头 = 远程API(自动识别)
#
# 远程源支持两种格式:
#   JSON: {"url":"...", "video_url":"...", "data":{"url":"...", "link":"..."}}
#   直接mp4流: 响应头 content-type=video/mp4（如 v.nrzj.vip）
#
# 提示: 如果某个源失效，直接删除或注释掉该行即可
sources:
  默认: /videos
  # 舞蹈: /videos/舞蹈
  # 搞笑: /videos/搞笑

  # --- 远程随机视频API ---
