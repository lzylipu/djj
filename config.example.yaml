server:
  port: 8080
  secret: change-me-to-random-string

# 视频源: 源名: URL
# / 开头 = 本地目录(自动扫描)
# http开头 = 远程API(自动识别)
#
# 支持的远程源类型:
#   · 302跳转: 取Location头中的mp4 URL (v.nrzj.vip, tmini _t)
#   · JSON API: 提取url/video_url/data.link (tmini mp4=json)
#   · 直接mp4流: 每次返回随机mp4 (yujn)
#   · HTML: 提取video src (tucdn)
sources:
  # --- 本地目录(取消注释即可启用) ---
  # 默认: /videos
  # 舞蹈: /videos/舞蹈
  # 搞笑: /videos/搞笑

  # --- 远程源(已验证) ---
  # 小姐姐视频: JSON API -> 快手随机视频
  小姐姐: https://tmini.net/api/meinv?mp4=json&r=

  # 绅士视频: 302跳转 -> 快手mp4
  绅士视频: https://v.nrzj.vip/video.php

  # 随机视频: 直接mp4流, 快手H.264
  随便看: https://api.yujn.cn/api/zzxjj.php

  # 热舞视频: HTML页面 -> 提取video src
  热舞视频: https://tucdn.wpon.cn/api-girl/index.php?type=video
