<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="google" value="notranslate">
<link rel="icon" type="image/x-icon" href="/img/favicon.ico">
<title>DJJ</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="pc">

<div class="app">
    <div class="player-wrap">
        <video id="player" autoplay preload muted playsinline controlslist="nodownload"
               poster="/img/bg.gif"></video>
    </div>
    <div class="sidebar">
        <h3>随机视频</h3>
        <div class="hint">
            按 <kbd>空格</kbd> 播放/暂停<br>
            按 <kbd>Up</kbd> 或 <kbd>N</kbd> 下一个<br>
            按 <kbd>Down</kbd> 或 <kbd>P</kbd> 上一个<br>
            按 <kbd>F</kbd> 全屏 &middot; <kbd>S</kbd> 换源 &middot; <kbd>M</kbd> 模式
        </div>
        <div class="hint source-label">点击换源切换数据源</div>
        <div class="hint love-label">点击爱心按钮收藏</div>
        <button class="ctrl-btn mode-btn" id="btnMode">单视频循环播放</button>
        <button class="ctrl-btn pass-btn" id="btnPass">PASS → 下一个</button>
        <img class="love-btn" id="btnLove" src="/img/love.png" alt="收藏">
        <button class="ctrl-btn" id="btnSource" style="background:#4682B4;margin-top:8px;">当前源【全部】</button>
        <button class="ctrl-btn" id="btnFav" style="background:#555;margin-top:8px;">我的收藏</button>
        <div style="margin-top:14px;font-size:11px;color:#666;">仅供学习研究，视频采集自网络</div>
    </div>
</div>

<div class="fav-panel" id="favPanel">
    <div class="fav-header">我的收藏</div>
    <button class="fav-close" id="favClose">&times;</button>
    <div id="favList"></div>
</div>

<script>
const HISTORY_MAX = 50;
const FAV_KEY = "djj_favs";
let currentMode = "loop", sourceIdx = -1, sourceList = [];
let history = [], historyIdx = -1, loading = false;
const player = document.getElementById("player");

function toast(msg) {
    const el = document.createElement("div"); el.className = "toast"; el.textContent = msg;
    document.body.appendChild(el); setTimeout(() => el.remove(), 1600);
}

function getFavs() { try { return JSON.parse(localStorage.getItem(FAV_KEY) || "[]"); } catch { return []; } }
function saveFavs(favs) { localStorage.setItem(FAV_KEY, JSON.stringify(favs)); }
function updateLoveIcon(isFav) { document.getElementById("btnLove").src = isFav ? "/img/loves.png" : "/img/love.png"; }
function addFav(token, name) {
    const favs = getFavs();
    if (favs.some(f => f.token === token)) { toast("已收藏"); return; }
    favs.unshift({token, name, ts: Date.now()}); saveFavs(favs); updateLoveIcon(true); toast("收藏成功");
}
function removeFav(token) { saveFavs(getFavs().filter(f => f.token !== token)); }

async function fetchRandom() {
    const source = sourceIdx >= 0 ? sourceList[sourceIdx] : null;
    const url = source ? "/api/random?source=" + encodeURIComponent(source) : "/api/random";
    const res = await fetch(url); if (!res.ok) throw new Error(); return res.json();
}

async function playNext() {
    if (loading) return; loading = true;
    try {
        const data = await fetchRandom();
        player.src = "/api/play?token=" + encodeURIComponent(data.token);
        try { await player.play(); } catch(e) {}
        if (historyIdx < history.length - 1) history = history.slice(0, historyIdx + 1);
        history.push({token: data.token, name: data.name || "未知"});
        if (history.length > HISTORY_MAX) history.shift();
        historyIdx = history.length - 1;
        updateLoveIcon(getFavs().some(f => f.token === data.token));
    } catch(e) { toast("加载失败"); }
    finally { loading = false; }
}

function playPrev() {
    if (historyIdx > 0) {
        historyIdx--; const item = history[historyIdx];
        player.src = "/api/play?token=" + encodeURIComponent(item.token);
        player.play().catch(() => {});
        updateLoveIcon(getFavs().some(f => f.token === item.token));
    } else toast("没有上一个了");
}

player.addEventListener("ended", () => {
    if (currentMode === "loop") { player.currentTime = 0; player.play().catch(() => {}); }
    else playNext();
});
player.addEventListener("error", () => { setTimeout(playNext, 1500); });

document.getElementById("btnMode").addEventListener("click", () => {
    currentMode = currentMode === "loop" ? "play" : "loop";
    document.getElementById("btnMode").textContent = currentMode === "loop" ? "单视频循环播放" : "连续播放模式";
    toast(currentMode === "loop" ? "循环" : "连播");
});
document.getElementById("btnPass").addEventListener("click", playNext);
document.getElementById("btnSource").addEventListener("click", async () => {
    if (!sourceList.length) await loadSources();
    sourceIdx++; if (sourceIdx >= sourceList.length) sourceIdx = -1;
    document.getElementById("btnSource").textContent = sourceIdx === -1 ? "当前源【全部】" : "当前源【" + sourceList[sourceIdx] + "】";
    toast(sourceIdx === -1 ? "全部随机" : sourceList[sourceIdx]); playNext();
});
document.getElementById("btnLove").addEventListener("click", () => {
    if (historyIdx < 0 || historyIdx >= history.length) return;
    const cur = history[historyIdx];
    if (getFavs().some(f => f.token === cur.token)) { removeFav(cur.token); updateLoveIcon(false); toast("取消收藏"); }
    else addFav(cur.token, cur.name);
});
document.getElementById("btnFav").addEventListener("click", showFavPanel);
document.getElementById("favClose").addEventListener("click", () => { document.getElementById("favPanel").classList.remove("open"); });

function showFavPanel() {
    const favs = getFavs(), list = document.getElementById("favList");
    if (!favs.length) { list.innerHTML = '<div class="fav-empty">暂无收藏</div>'; }
    else {
        list.innerHTML = favs.map(f => '<div class="fav-item" data-token="'+f.token+'">'+f.name+'</div>').join("");
        list.querySelectorAll(".fav-item").forEach(el => {
            el.addEventListener("click", () => {
                player.src = "/api/play?token=" + encodeURIComponent(el.dataset.token);
                player.play().catch(() => {});
                document.getElementById("favPanel").classList.remove("open");
            });
        });
    }
    document.getElementById("favPanel").classList.add("open");
}

function toggleFullScreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
    else document.exitFullscreen?.();
}

document.addEventListener("keydown", (e) => {
    switch(e.key) {
        case " ": e.preventDefault(); player.paused ? player.play().catch(()=>{}) : player.pause(); break;
        case "ArrowUp": case "n": playNext(); break;
        case "ArrowDown": case "p": playPrev(); break;
        case "f": toggleFullScreen(); break;
        case "s": document.getElementById("btnSource").click(); break;
        case "m": document.getElementById("btnMode").click(); break;
    }
});

async function loadSources() { try { const res = await fetch("/api/sources"); const data = await res.json(); sourceList = data.sources || []; } catch(e) {} }
(async () => { await loadSources(); playNext(); })();
</script>
</body>
</html>
