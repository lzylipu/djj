<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no">
<meta name="google" value="notranslate">
<link rel="icon" type="image/x-icon" href="/img/favicon.ico">
<title>DJJ</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app" ontouchmove="return false;">
    <video id="player" autoplay preload muted playsinline controlslist="nodownload"
           x5-video-player-type="h5" x5-video-player-fullscreen="true"
           x5-video-ignore-metadata="true" poster="/img/bg.gif"></video>
    <div class="sidebar" id="sidebar">
        <h3>随机视频</h3>
        <div class="hint">Space 暂停 | N 下一个 | P 上一个 | F 全屏 | S 换源 | M 模式</div>
        <div class="hint source-label">点击换源切换数据源</div>
        <div class="hint love-label">点击爱心收藏</div>
        <button class="ctrl-btn mode-btn" id="btnMode">循环</button>
        <button class="ctrl-btn pass-btn" id="btnPass">PASS</button>
        <img class="love-btn" id="btnLove" src="/img/love.png" alt="love">
        <button class="ctrl-btn source-btn" id="btnSource">换源</button>
        <button class="ctrl-btn fav-btn" id="btnFav">收藏</button>
        <div class="disclaimer-pc">仅供学习研究，视频采集自网络</div>
    </div>
</div>
<div id="texts">
    <span class="username" id="username">@DJJ</span>
    <div class="disclaimer">仅供学习研究，视频采集自网络<br><span class="msg" id="msg">加载中...</span></div>
</div>
<span id="time">00:00:00</span>
<div id="hints"><div>上滑-下一个</div><div>下滑-上一个</div><div>左右滑-显隐文字</div><div>单击-暂停</div><div>双击-全屏</div></div>
<div id="controls">
    <button class="btn-mode" id="btnModeM">循环</button>
    <button class="btn-source" id="btnSourceM">换源</button>
    <button class="btn-pass" id="btnPassM">PASS</button>
    <img class="btn-love" id="btnLoveM" src="/img/love.png" alt="love">
</div>
<div class="fav-panel" id="favPanel"><div class="fav-header">收藏</div><button class="fav-close" id="favClose">X</button><div id="favList"></div></div>
<script>
(function(){
var m=/Android|iPhone|iPod|iPad|Mobile|UCWEB/i.test(navigator.userAgent);
document.body.className=m?"mobile":"pc";
if(!m)document.getElementById("player").removeAttribute("x5-video-player-type");
var M="loop",Si=-1,SL=[],H=[],Hi=-1,L=!1,P=document.getElementById("player"),G=document.getElementById("msg"),U=document.getElementById("username"),$=function(i){return document.getElementById(i)};
setInterval(function(){var c=new Date;$("time").textContent=[c.getHours(),c.getMinutes(),c.getSeconds()].map(function(n){return String(n).padStart(2,"0")}).join(":");},1e3);
setTimeout(function(){var a=$("hints");a&&a.classList.add("hidden");},1e4);
function T(a){var b=document.createElement("div");b.className="toast";b.textContent=a;document.body.appendChild(b);setTimeout(function(){b.remove();},1600)}
function GF(){try{return JSON.parse(localStorage.getItem("djj_favs")||"[]")}catch(e){return[]}}
function SF(f){localStorage.setItem("djj_favs",JSON.stringify(f))}
function UL(a){var s=a?"/img/loves.png":"/img/love.png";document.querySelectorAll("#btnLove,#btnLoveM").forEach(function(e){if(e)e.src=s})}
function AF(t,n){var f=GF();if(f.some(function(x){return x.token===t})){T("已收藏");return}f.unshift({token:t,name:n,ts:Date.now()});SF(f);UL(true);T("收藏成功")}
function RF(t){SF(GF().filter(function(x){return x.token!==t}))}
async function FR(){var s=Si>=0?SL[Si]:null,u=s?"/api/random?source="+encodeURIComponent(s):"/api/random",r=await fetch(u);if(!r.ok)throw new Error();return r.json()}
async function PN(){if(L)return;L=true;G&&(G.textContent="加载中...");try{var d=await FR();P.src="/api/play?token="+encodeURIComponent(d.token);try{await P.play()}catch(e){}G&&(G.textContent="播放中");U&&(U.textContent="@"+(d.name||"未知"));if(Hi<H.length-1)H=H.slice(0,Hi+1);H.push({token:d.token,name:d.name||"未知"});H.length>50&&H.shift();Hi=H.length-1;UL(GF().some(function(x){return x.token===d.token}));SB()}catch(e){G&&(G.textContent="加载失败");T("加载失败")}finally{L=false}}
function PP(){if(Hi>0){Hi--;var a=H[Hi];P.src="/api/play?token="+encodeURIComponent(a.token);P.play().catch(function(){});G&&(G.textContent="播放中");U&&(U.textContent="@"+a.name);UL(GF().some(function(x){return x.token===a.token}))}else T("没了")}
function SB(){var a=document.querySelectorAll("#btnMode,#btnModeM");a.forEach(function(e){e&&(e.textContent=M==="loop"?(m?"循环":"单视频循环播放"):(m?"连播":"连续播放模式"))});var c=document.querySelectorAll("#btnSource,#btnSourceM");c.forEach(function(e){e&&(e.textContent=Si===-1?(m?"全部":"换源【全部】"):(m?SL[Si]:"换源【"+SL[Si]+"】"))})}
P.addEventListener("ended",function(){M==="loop"?(P.currentTime=0,P.play().catch(function(){})):PN()});
P.addEventListener("error",function(){G&&(G.textContent="视频加载失败");setTimeout(PN,1500)});
function TM(){M=M==="loop"?"play":"loop";SB();T(M==="loop"?"循环":"连播")}
function TS(){SL.length||(LS().then(TS));Si++;Si>=SL.length&&(Si=-1);SB();T(Si===-1?"全部":SL[Si]);PN()}
function TL(){if(Hi<0||Hi>=H.length){T("暂无视频");return}var a=H[Hi];GF().some(function(x){return x.token===a.token})?(RF(a.token),UL(false),T("取消收藏")):AF(a.token,a.name)}
function FP(){var f=GF(),l=$("favList");if(!f.length){l.innerHTML='<div class="fav-empty">暂无收藏</div>'}else{l.innerHTML=f.map(function(x){return'<div class="fav-item" data-token="'+x.token+'">'+x.name+"</div>"}).join("");l.querySelectorAll(".fav-item").forEach(function(e){e.addEventListener("click",function(){P.src="/api/play?token="+encodeURIComponent(e.dataset.token);P.play().catch(function(){});$("favPanel").classList.remove("open")})})}$("favPanel").classList.add("open")}
$("btnMode").addEventListener("click",TM);$("btnPass").addEventListener("click",PN);$("btnSource").addEventListener("click",TS);$("btnLove").addEventListener("click",TL);
if($("btnFav"))$("btnFav").addEventListener("click",FP);
if($("btnModeM"))$("btnModeM").addEventListener("click",TM);if($("btnPassM"))$("btnPassM").addEventListener("click",PN);
if($("btnSourceM"))$("btnSourceM").addEventListener("click",TS);if($("btnLoveM"))$("btnLoveM").addEventListener("click",TL);
$("favClose").addEventListener("click",function(){$("favPanel").classList.remove("open")});
(function(){var a=null,b=$("btnLoveM");b&&(b.addEventListener("touchstart",function(){a=setTimeout(FP,600)}),b.addEventListener("touchend",function(){clearTimeout(a)}),b.addEventListener("touchmove",function(){clearTimeout(a)}),b.addEventListener("contextmenu",function(e){e.preventDefault();FP()}))})();
if(m){(function(){var a=0,b=0;document.addEventListener("touchstart",function(e){a=e.touches[0].pageX;b=e.touches[0].pageY});document.addEventListener("touchend",function(e){var d=e.changedTouches[0].pageX-a,y=e.changedTouches[0].pageY-b,an=Math.atan2(y,d)*180/Math.PI;Math.abs(d)<15&&Math.abs(y)<15||(an>=-135&&an<=-45?PN():an>45&&an<135?PP():(an>=135&&an<=180||an>=-180&&an<-135)?$("texts").style.display="none":an>=-45&&an<=45&&($("texts").style.display=""))})})();
(function(){var a=null;P.addEventListener("click",function(){a?(clearTimeout(a),a=null,FS()):a=setTimeout(function(){a=null;P.paused?P.play().catch(function(){}):P.pause()},250)})})()}
function FS(){document.fullscreenElement?(document.exitFullscreen||document.webkitExitFullscreen||function(){})():((document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen||function(){}).call(document.documentElement))}
document.addEventListener("keydown",function(e){switch(e.key){case" ":e.preventDefault();P.paused?P.play().catch(function(){}):P.pause();break;case"ArrowUp":case"n":PN();break;case"ArrowDown":case"p":PP();break;case"f":FS();break;case"s":TS();break;case"m":TM()}});
async function LS(){try{var r=await fetch("/api/sources"),d=await r.json();SL=d.sources||[]}catch(e){}}
(async function(){await LS();PN()})();
})();</script>
</body>
</html>
