<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no">
<meta name="google" value="notranslate">
<link rel="icon" type="image/x-icon" href="/img/favicon.ico">
<meta name="referrer" content="never">
<title>DJJ - 随机短视频</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Mobile -->
<div class="mobile-layout" id="mobileLayout">
  <div class="video-wrap">
    <video id="playerM" autoplay preload playsinline controlslist="nodownload"
           x5-video-player-type="h5" x5-video-player-fullscreen="true"
           x5-video-ignore-metadata="true" poster="/img/bg.gif"></video>
    <div class="video-info" id="textsM">
      <span class="vid-name" id="vidNameM">@DJJ</span>
      <span class="vid-status" id="vidStatusM">...</span>
    </div>
    <div class="mobile-controls">
      <button class="mc-btn mc-btn-accent" id="btnPassM">PASS</button>
      <button class="mc-btn" id="btnModeM">循环</button>
      <button class="mc-btn" id="btnSourceM">全部</button>
      <img class="mc-love" id="btnLoveM" src="/img/love.png" alt="">
    </div>
    <div class="mobile-clock" id="clockM">00:00:00</div>
    <div class="mobile-hints" id="hintsM">
      <span>上滑 下一个</span><span>下滑 上一个</span>
      <span>左右滑 显隐文字</span><span>点触 暂停/播放</span>
      <span>双击 全屏</span>
    </div>
  </div>
</div>

<!-- PC: video maximized left + compact right panel -->
<div class="pc-layout" id="pcLayout">
  <div class="pc-video-area">
    <video id="playerPC" autoplay preload playsinline controlslist="nodownload"
           x5-video-player-type="h5" x5-video-player-fullscreen="true"
           x5-video-ignore-metadata="true" poster="/img/bg.gif"></video>
    <div class="pc-video-info">
      <span class="pc-vid-name" id="vidNamePC">@DJJ</span>
      <span class="pc-vid-status" id="vidStatusPC">...</span>
    </div>
    <div class="pc-hint">单击 播放/暂停 · 双击 全屏</div>
  </div>

  <div class="pc-right-panel">
    <div class="pc-brand">
      <img src="/img/logo.png" class="pc-logo-img" alt="">
      <div class="pc-brand-text">
        <h1>DJJ</h1>
        <p>随机短视频</p>
      </div>
    </div>

    <div class="pc-ctrl">
      <button class="pc-btn red" id="btnPassPC">PASS 换一个</button>
      <button class="pc-btn purple" id="btnModePC">单视频循环</button>
      <button class="pc-btn blue" id="btnSourcePC">换源【全部】</button>
    </div>

    <div class="pc-fav-row">
      <button class="pc-btn mini ghost" id="btnLovePC">&hearts; 收藏</button>
      <button class="pc-btn mini ghost" id="btnFavPC">列表</button>
    </div>

    <div class="pc-keys">
      <kbd>Space</kbd>暂停 <kbd>N</kbd>下一个 <kbd>P</kbd>上一个
      <kbd>F</kbd>全屏 <kbd>S</kbd>换源 <kbd>M</kbd>模式 <kbd>V</kbd>声音
    </div>

    <div class="pc-disclaimer">仅供学习研究 · 视频采集自网络</div>
  </div>
</div>

<!-- Fav panel -->
<div class="fav-panel" id="favPanel">
  <div class="fav-header">收藏列表<button class="fav-close" id="favClose">&times;</button></div>
  <div id="favList"></div>
</div>

<!-- Sound hint -->
<div class="sound-hint" id="soundHint">&#x1F50A; 点击页面或按V开启声音</div>

<script>
(function(){
var isM=/Android|iPhone|iPod|iPad|Mobile|UCWEB/i.test(navigator.userAgent);
var mE=document.getElementById('mobileLayout'),pE=document.getElementById('pcLayout');
if(isM){pE.style.display='none';document.body.classList.add('mobile-mode')}
else{mE.style.display='none'}

var player=isM?document.getElementById('playerM'):document.getElementById('playerPC');
var vidN=isM?document.getElementById('vidNameM'):document.getElementById('vidNamePC');
var vidS=isM?document.getElementById('vidStatusM'):document.getElementById('vidStatusPC');
var M='loop',Si=-1,SL=[],H=[],Hi=-1,L=false;

/* clock */
function tick(){var c=new Date();var el=document.getElementById('clockM');if(el)el.textContent=[c.getHours(),c.getMinutes(),c.getSeconds()].map(function(n){return String(n).padStart(2,'0')}).join(':')}
setInterval(tick,1e3);tick();

/* hints fade */
setTimeout(function(){var h=document.getElementById('hintsM');if(h)h.classList.add('hidden')},6e3);

/* toast */
function toast(a){var b=document.createElement('div');b.className='toast';b.textContent=a;document.body.appendChild(b);setTimeout(function(){b.remove()},1600)}

/* === SOUND: aggressive unmute === */
var soundOn=false;
player.muted=true;
var sHint=document.getElementById('soundHint');
function unmute(){if(player.muted){player.muted=false;soundOn=true;if(sHint)sHint.style.display='none'}}
function mute(){player.muted=true;soundOn=false;if(sHint)sHint.style.display='block'}

document.addEventListener('click',unmute);
document.addEventListener('keydown',function(e){if(e.key==='v'||e.key==='V'){soundOn?mute():unmute();e.preventDefault()}});

/* playing event = try unmute immediately */
player.addEventListener('playing',function(){
  if(!soundOn){player.muted=false;soundOn=true;if(sHint)sHint.style.display='none'}
});

/* === Favs === */
function GF(){try{return JSON.parse(localStorage.getItem('djj_favs')||'[]')}catch(e){return[]}}
function SF(f){localStorage.setItem('djj_favs',JSON.stringify(f))}
function updLoveUI(isL){
  var elM=document.getElementById('btnLoveM');if(elM)elM.src=isL?'/img/loves.png':'/img/love.png';
  var elP=document.getElementById('btnLovePC');if(elP)elP.textContent=isL?'❤ 已收藏':'♡ 收藏';
}
function addFav(t,n){var f=GF();if(f.some(function(x){return x.token===t})){toast('已收藏');return}f.unshift({token:t,name:n,ts:Date.now()});SF(f);updLoveUI(true);toast('收藏成功')}
function rmFav(t){SF(GF().filter(function(x){return x.token!==t}))}

/* === Core === */
async function fetchRandom(){
  var s=Si>=0?SL[Si]:null,u=s?'/api/random?source='+encodeURIComponent(s):'/api/random';
  var r=await fetch(u);if(!r.ok)throw new Error();return r.json()
}

async function playNext(){
  if(L)return;L=true;
  if(vidS)vidS.textContent='加载中...';
  for(var retry=0;retry<3;retry++){
    try{
      var d=await fetchRandom();
      player.src='/api/play?token='+encodeURIComponent(d.token);
      try{await player.play()}catch(e){}
      player.muted=false;soundOn=true;if(sHint)sHint.style.display='none';
      if(vidS)vidS.textContent='▶ 播放中';
      if(vidN)vidN.textContent='@'+(d.name||'未知');
      if(Hi<H.length-1)H=H.slice(0,Hi+1);
      H.push({token:d.token,name:d.name||'未知'});
      if(H.length>50)H.shift();
      Hi=H.length-1;
      updLoveUI(GF().some(function(x){return x.token===d.token}));
      updUI();
      L=false;return
    }catch(e){}
  }
  if(vidS)vidS.textContent='加载失败';
  toast('加载失败，已重试3次');
  L=false
}

function playPrev(){
  if(Hi>0){Hi--;var a=H[Hi];
    player.src='/api/play?token='+encodeURIComponent(a.token);player.play().catch(function(){});
    if(vidS)vidS.textContent='▶ 播放中';if(vidN)vidN.textContent='@'+a.name;
    updLoveUI(GF().some(function(x){return x.token===a.token}))
  }else toast('没了')
}

/* UI update */
function updUI(){
  var mt=M==='loop'?(isM?'循环':'单视频循环'):(isM?'连播':'连续播放');
  ['btnModeM','btnModePC'].forEach(function(id){var e=document.getElementById(id);if(e)e.textContent=mt});
  var st=Si===-1?(isM?'全部':'换源【全部】'):(isM?SL[Si]:'换源【'+SL[Si]+'】');
  ['btnSourceM','btnSourcePC'].forEach(function(id){var e=document.getElementById(id);if(e)e.textContent=st});
}
function toggleMode(){M=M==='loop'?'play':'loop';updUI();toast(M==='loop'?'循环模式':'连播模式')}
function toggleSource(){SL.length||loadSources().then(toggleSource);Si++;if(Si>=SL.length)Si=-1;updUI();toast(Si===-1?'全部':SL[Si]);playNext()}
function toggleSourceBack(){SL.length||loadSources().then(toggleSourceBack);Si--;if(Si<-1)Si=SL.length-1;updUI();toast(Si===-1?'全部':SL[Si]);playNext()}
function toggleLove(){if(Hi<0||Hi>=H.length){toast('暂无');return}var a=H[Hi];if(GF().some(function(x){return x.token===a.token})){rmFav(a.token);updLoveUI(false);toast('取消收藏')}else addFav(a.token,a.name)}
function showFav(){
  var f=GF(),el=document.getElementById('favList');
  if(!f.length)el.innerHTML='<div class="fav-empty">暂无收藏</div>';
  else{el.innerHTML=f.map(function(x){return '<div class="fav-item" data-token="'+x.token+'">'+x.name+'</div>'}).join('');
    el.querySelectorAll('.fav-item').forEach(function(e){e.addEventListener('click',function(){
      player.src='/api/play?token='+encodeURIComponent(e.dataset.token);player.play().catch(function(){});
      document.getElementById('favPanel').classList.remove('open')
    })})}
  document.getElementById('favPanel').classList.add('open')
}

/* events */
player.addEventListener('ended',function(){if(M==='loop'){player.currentTime=0;player.play().catch(function(){})}else playNext()});
player.addEventListener('error',function(){if(vidS)vidS.textContent='视频加载失败';setTimeout(playNext,1500)});

['btnModeM','btnModePC'].forEach(function(id){var e=document.getElementById(id);if(e)e.addEventListener('click',toggleMode)});
['btnPassM','btnPassPC'].forEach(function(id){var e=document.getElementById(id);if(e)e.addEventListener('click',playNext)});
['btnSourceM','btnSourcePC'].forEach(function(id){var e=document.getElementById(id);if(e)e.addEventListener('click',toggleSource)});
['btnLoveM','btnLovePC'].forEach(function(id){var e=document.getElementById(id);if(e)e.addEventListener('click',toggleLove)});
var fb=document.getElementById('btnFavPC');if(fb)fb.addEventListener('click',showFav);
var fc=document.getElementById('favClose');if(fc)fc.addEventListener('click',function(){document.getElementById('favPanel').classList.remove('open')});

/* mobile long-press love = fav panel */
(function(){var a=null,b=document.getElementById('btnLoveM');if(b){
  b.addEventListener('touchstart',function(){a=setTimeout(showFav,600)});
  b.addEventListener('touchend',function(){clearTimeout(a)});
  b.addEventListener('touchmove',function(){clearTimeout(a)});
  b.addEventListener('contextmenu',function(e){e.preventDefault();showFav()})
}})();

/* mobile gestures */
if(isM){(function(){
  var ax=0,ay=0;
  document.addEventListener('touchstart',function(e){ax=e.touches[0].pageX;ay=e.touches[0].pageY});
  document.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].pageX-ax,dy=e.changedTouches[0].pageY-ay;
    var ang=Math.atan2(dy,dx)*180/Math.PI;
    if(Math.abs(dx)<15&&Math.abs(dy)<15)return;
    if(ang>=-135&&ang<=-45)playNext();
    else if(ang>45&&ang<135)playPrev();
    else if(ang>=135||ang<-135)document.getElementById('textsM').style.display='none';
    else if(ang>=-45&&ang<=45)document.getElementById('textsM').style.display='';
  })
})();

/* mobile: single-click pause / double-click fullscreen */
(function(){var a=null;
  player.addEventListener('click',function(){
    if(a){clearTimeout(a);a=null;toggleFS()}
    else{a=setTimeout(function(){a=null;player.paused?player.play().catch(function(){}):player.pause()},250)}
  })
})()}

/* PC: click = pause/play, dblclick = fullscreen (like reference pc.html) */
if(!isM){var tt=new Date().getTime();
  player.addEventListener('click',function(){
    if(new Date().getTime()-tt<500){toggleFS()}
    else{tt=new Date().getTime();player.paused?player.play().catch(function(){}):player.pause()}
  })
}

/* fullscreen */
function toggleFS(){
  if(document.fullscreenElement)(document.exitFullscreen||function(){})();
  else(player.requestFullscreen||function(){}).call(player)
}

/* PC keyboard */
if(!isM){document.addEventListener('keydown',function(e){
  switch(e.key){
    case ' ':case 'k':e.preventDefault();player.paused?player.play().catch(function(){}):player.pause();break;
    case 'ArrowLeft':playPrev();break;
    case 'ArrowRight':playNext();break;
    case 'ArrowUp':toggleSourceBack();break;
    case 'ArrowDown':toggleSource();break;
    case 'f':case 'F':toggleFS();break;
    case 'v':case 'V':soundOn?mute():unmute();break;
    case 'm':case 'M':toggleMode();break
  }
})}

/* PC mouse wheel → volume */
if(!isM){document.addEventListener('wheel',function(e){
  e.preventDefault();
  player.volume=Math.max(0,Math.min(1,player.volume-e.deltaY*0.002));
  if(player.volume===0)player.muted=true;else player.muted=false
},{passive:!1})}
/* sources */
async function loadSources(){try{var r=await fetch('/api/sources'),d=await r.json();SL=d.sources||[]}catch(e){}}

/* boot */
(async function(){await loadSources();playNext()})();
})();
</script>
</body>
</html>
